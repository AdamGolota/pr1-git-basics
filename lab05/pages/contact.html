<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Форма зворотного зв'язку — напишіть мені повідомлення, оберіть тему та зручний спосіб контакту.">
  <title>Контакти | Мій перший HTML-сайт</title>
  <link rel="stylesheet" href="../styles/style.css">
  <link rel="stylesheet" href="../styles/responsive.css">
</head>
<body>

  <header class="site-header">
    <div class="container header-inner">
      <a href="../index.html" class="site-logo">Мій перший HTML-сайт</a>
      <nav>
        <ul class="nav-list">
          <li><a href="../index.html">Головна</a></li>
          <li><a href="./about.html">Про мене</a></li>
          <li><a href="./contact.html" class="active">Контакти</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="container">

    <section class="card form-section">
      <h2>Контакти</h2>
      <p>
        Заповніть форму нижче, і я зв'яжуся з вами якомога швидше.
        Поля, позначені <strong>*</strong>, є обов'язковими.
      </p>

      <form action="./submit.html" method="get">

        <div class="form-group">
          <label for="name">Ім'я *:</label>
          <input
            id="name"
            name="name"
            type="text"
            required
            minlength="2"
            maxlength="50"
            placeholder="Введіть ваше ім'я"
          >
        </div>

        <div class="form-group">
          <label for="email">Email *:</label>
          <input
            id="email"
            name="email"
            type="email"
            required
            placeholder="example@mail.com"
          >
        </div>

        <div class="form-group">
          <label for="phone">Телефон (необов'язково):</label>
          <input
            id="phone"
            name="phone"
            type="tel"
            pattern="[+]?[0-9\s\-]{7,15}"
            placeholder="+38 050 123 45 67"
          >
        </div>

        <div class="form-group">
          <label for="topic">Тема звернення:</label>
          <select id="topic" name="topic">
            <option value="">-- оберіть тему --</option>
            <option value="study">Навчання</option>
            <option value="work">Співпраця</option>
            <option value="question">Запитання</option>
            <option value="other">Інше</option>
          </select>
        </div>

        <fieldset>
          <legend>Зручний спосіб зв'язку</legend>
          <label>
            <input type="radio" name="contactWay" value="email" checked>
            Email
          </label>
          <label>
            <input type="radio" name="contactWay" value="phone">
            Телефон
          </label>
          <label>
            <input type="radio" name="contactWay" value="any">
            Будь-який
          </label>
        </fieldset>

        <div class="form-group">
          <label for="message">Повідомлення:</label>
          <textarea
            id="message"
            name="message"
            rows="6"
            minlength="10"
            maxlength="1000"
            placeholder="Напишіть своє повідомлення..."
          ></textarea>
        </div>

        <div class="form-group">
          <label>
            <input type="checkbox" name="agree" required>
            Погоджуюся з <a href="#">правилами обробки персональних даних</a> *
          </label>
        </div>

        <div class="form-submit">
          <button type="submit" class="btn btn-primary">Надіслати</button>
        </div>

      </form>
    </section>

  </main>

  <footer class="site-footer">
    <div class="container">
      <p>&copy; 2026 Адам Голота &mdash; група 232/1</p>
    </div>
  </footer>

</body>
</html>
